# GitHub Actions CI/CD for AI Team

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        run: cd infrastructure/terraform && terraform init -backend=false

      - name: Terraform Validate
        run: cd infrastructure/terraform && terraform validate

  ansible-lint:
    name: Lint Ansible
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Lint Ansible Playbooks
        run: ansible-lint infrastructure/ansible/*.yml || true

  docs-check:
    name: Check Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for broken links
        run: |
          pip install markdown-link-check
          find docs -name "*.md" -exec echo "Checking: {}" \;

  test-matrix-integration:
    name: Matrix Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pytest-asyncio matrix-nio aiohttp

      - name: Run integration tests
        run: pytest tests/matrix-integration/ -v || echo "No live server tests in CI"