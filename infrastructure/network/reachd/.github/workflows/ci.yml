name: reachd CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      test_platform:
        description: 'Test platform target'
        required: true
        default: 'pve-integration'
        type: choice
        options:
          - pve-integration
          - unit-only

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Unit Tests (always runs)
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -q pytest pyyaml

      - name: Run unit tests
        run: |
          pytest tests/test_reachd.py -v --tb=short

  # ─────────────────────────────────────────────
  # Job 2: Lint & Type Check
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install -q flake8 pyyaml

      - name: Run flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Validate YAML configs
        run: |
          python3 -c "import yaml; [yaml.safe_load(open(f'tests/{f}')) for f in __import__('os').listdir('tests') if f.endswith('.yaml')]"
          echo "Config validation passed"

  # ─────────────────────────────────────────────
  # Job 3: Integration Tests (manual trigger only)
  # ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (PVE)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: pip install -q pytest pyyaml

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PVE_SSH_KEY }}" > ~/.ssh/pve_key
          chmod 600 ~/.ssh/pve_key
          ssh-keyscan -H ${{ secrets.PVE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify PVE connectivity
        run: |
          ssh -i ~/.ssh/pve_key root@${{ secrets.PVE_HOST }} 'echo PVE connected && pct list | grep reachd'

      - name: Deploy test platform (Terraform)
        run: |
          cd terraform/reachd-test
          terraform init -upgrade
          terraform apply -var-file=reachd-test.tfvars -auto-approve -var="pve_ssh_key=/root/.ssh/pve_key"

      - name: Wait for nodes to boot
        run: sleep 30

      - name: Run integration tests
        run: |
          python3 tests/test_reachd_integration.py \
            --pve-host ${{ secrets.PVE_HOST }} \
            --pve-ssh-key /root/.ssh/pve_key \
            --nodes 10.0.8.11,10.0.8.12,10.0.8.13

      - name: Teardown
        if: always()
        run: |
          cd terraform/reachd-test
          terraform destroy -var-file=reachd-test.tfvars -auto-approve || true