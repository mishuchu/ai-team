version: "3.8"

# reachd — 自组织自愈合多信道网络中间件
#部署示例：docker-compose up -d

services:
  reachd:
    image: python:3.11-slim
    container_name: reachd
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - ./config:/app/config:ro
      - /run/tailscale:/run/tailscale:ro
      - /dev/net/tun:/dev/net/tun:rw
      - reachd-state:/tmp/reachd
    environment:
      - PYTHONUNBUFFERED=1
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    init: true
    command: ["python", "src/reachd.py", "daemon", "-c", "config/channels.yaml"]

  nginx-proxy:
    image: nginx:alpine
    container_name: reachd-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./scripts/proxy/nginx.sh:/docker-entrypoint.d/99-reachd.sh:ro
      - reachd-state:/tmp/reachd:ro
      - ./config/nginx.conf.template:/etc/nginx/conf.d/reachd.conf.template:ro
    environment:
      - INGRESS_HTTP=8080
      - INGRESS_HTTPS=8443
      - APP_PORT=8080
      - STATE_FILE=/tmp/reachd/reachd_active_channel
    entrypoint: []
    command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]

volumes:
  reachd-state:
